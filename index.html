<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertor de moedas</title>
    <link rel="stylesheet" href="desafio.css">   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Oswald&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
</head>
<body>
    <img src="assets/logo1.png" alt="Logo" class="logo" />
    <div class="container">
        
        <div>
            <label>Converter <b>de</b> </label>
            <br>
            <select name="moeda">
                <option value="BRL">R$  Real Brasileiro</option>
                <option value="USD">US$  Dólar Americano</option>                
                <option value="EUR">€  Euro</option>
                <option value="LIB">£  Libra</option>
                <option value="BIT">₿Bitcoin</option>
            </select>
        </div>
        <div>
            <label>Converter <b>para</b> </label>
            <br>
            <select name="moeda" id="moeda">
                <option value="USD">US$  Dólar Americano</option>
                <option value="BRL">R$  Real Brasileiro</option>
                <option value="EUR">€  Euro</option>
                <option value="LIB">£  Libra</option>
                <option value="BIT">₿  Bitcoin</option>
            </select>
        </div>

        <div>
            <label>
                Valor
                <input class="input-currency"type="text" placeholder="R$0,00">
            </label>
            
        </div>
        <div>
            <button class="convert-button">Converter</button>
        </div>

        <section class="resultado">
            <div class="currency-box">
                <img src="assets/real.png" alt="Real" class="real">
                <h6>Real Brasileiro</h6>
                <p id="currency-value-to-convert">R$ 0,00</p>
            </div>
            
                <img src="assets/arrow.png" alt="Seta" class="arrow">
            
            <div class="currency-box" id="currency-name">
                <img src="assets/dolar.png" alt="Dólar" class="dolar">
                <h6>Dólar Americano</h6>
                <p id="currency-value">US$ 0,00</p>
            </div>
        </section>
    </div>

</body>
<script src="desafio.js"></script>
